<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:              #0e0e0f;
            --surface:         #18181b;
            --surface-2:       #232328;
            --border:          rgba(255,255,255,0.07);
            --border-hover:    rgba(255,255,255,0.14);
            --accent:          #c8f35a;
            --text-primary:    #f0efea;
            --text-secondary:  #888880;
            --text-muted:      #4a4a45;
            --bubble-out:      #c8f35a;
            --bubble-out-text: #1a1f08;
            --bubble-in:       #232328;
            --danger:          #e24b4a;
            --sat: env(safe-area-inset-top,    0px);
            --sab: env(safe-area-inset-bottom, 0px);
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            padding-top: var(--sat); 
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(14,14,15,0.85);
            display: flex;
            align-items: flex-end; 
            z-index: 200;
        }
        .overlay.hidden { display: none; }

        .overlay-sheet {
            width: 100%;
            background: var(--surface);
            border-radius: 20px 20px 0 0;
            padding: 24px 20px calc(20px + var(--sab));
            display: flex;
            flex-direction: column;
            gap: 14px;
            animation: slideUp 0.28s cubic-bezier(0.32, 0.72, 0, 1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        .sheet-handle {
            width: 36px; height: 4px;
            background: var(--border-hover);
            border-radius: 2px;
            margin: 0 auto 4px;
        }

        .overlay-title {
            font-family: 'Instrument Serif', serif;
            font-size: 20px; font-weight: 400;
        }
        .overlay-sub {
            font-size: 13px; color: var(--text-secondary);
            margin-top: -6px; line-height: 1.5;
        }
        .overlay-input {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 16px; 
            padding: 13px 16px;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            outline: none; width: 100%;
            transition: border-color 0.15s;
            -webkit-appearance: none;
        }
        .overlay-input:focus { border-color: var(--border-hover); }

        .overlay-btn {
            background: var(--accent); color: #1a1f08;
            border: none; border-radius: 12px;
            padding: 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 500;
            cursor: pointer;
            transition: opacity 0.1s, transform 0.1s;
            -webkit-appearance: none;
        }
        .overlay-btn:active { opacity: 0.8; transform: scale(0.98); }
        .overlay-error { font-size: 12px; color: var(--danger); min-height: 14px; margin-top: -6px; }

        .header {
            flex-shrink: 0;
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px 10px;
            border-bottom: 1px solid var(--border);
        }
        .header-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

        .header-title {
            font-family: 'Instrument Serif', serif;
            font-size: 17px; font-weight: 400;
        }
        .header-right { margin-left: auto; }

        .nick-badge {
            font-family: 'DM Mono', monospace;
            font-size: 11px; color: var(--accent);
            letter-spacing: 0.04em;
            display: inline-block;
            padding: 8px 10px; margin: -4px;
            border: 1px solid rgba(200,243,90,0.2);
            border-radius: 8px; cursor: pointer;
            max-width: 110px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        #chat {
            flex: 1;
            overflow-y: auto; overflow-x: hidden;
            padding: 12px 14px 6px;
            display: flex; flex-direction: column; gap: 4px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            scroll-behavior: smooth;
        }
        #chat::-webkit-scrollbar { display: none; }

        .empty-state {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 6px; color: var(--text-muted); font-size: 13px;
        }

        .msg-wrapper {
            display: flex;
            animation: fadeUp 0.15s ease;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(4px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .msg-wrapper.outgoing { justify-content: flex-end; }
        .msg-wrapper.incoming { justify-content: flex-start; }

        .msg-col {
            display: flex; flex-direction: column; gap: 2px;
            max-width: 82%; 
        }
        .msg-wrapper.outgoing .msg-col { align-items: flex-end; }
        .msg-wrapper.incoming .msg-col { align-items: flex-start; }

        .nick {
            font-family: 'DM Mono', monospace;
            font-size: 10px; color: var(--text-muted); padding: 0 4px;
        }
        .bubble {
            font-size: 15px;
            line-height: 1.55;
            padding: 10px 14px;
            border-radius: 18px;
            word-break: break-word;
            overflow-wrap: anywhere;
        }
        .bubble.out {
            background: var(--bubble-out); color: var(--bubble-out-text);
            border-bottom-right-radius: 4px; font-weight: 500;
        }
        .bubble.in {
            background: var(--bubble-in); color: var(--text-primary);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .ts {
            font-family: 'DM Mono', monospace;
            font-size: 10px; color: var(--text-muted); padding: 0 4px;
        }

        .input-area {
            flex-shrink: 0;
            padding: 8px 12px calc(8px + var(--sab));
            border-top: 1px solid var(--border);
            background: var(--bg);
        }
        .input-row {
            display: flex; align-items: flex-end; gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 8px 8px 8px 16px;
        }
        #message {
            flex: 1; background: transparent; border: none; outline: none;
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px; /* iOS 줌 방지 */
            line-height: 1.4;
            resize: none; height: 26px; max-height: 110px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #message::placeholder { color: var(--text-muted); }

        #send {
            width: 40px; height: 40px; /* 44px급 터치 타겟 */
            border-radius: 50%;
            background: var(--accent); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.1s, transform 0.1s;
            -webkit-appearance: none;
        }
        #send:active { opacity: 0.75; transform: scale(0.9); }
        #send svg { width: 17px; height: 17px; fill: #1a1f08; }

        @media (min-width: 769px) {
            body {
                display: flex; align-items: center; justify-content: center;
                background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.03) 1px, transparent 0);
                background-size: 28px 28px;
            }
            .app {
                position: relative; inset: auto;
                width: 460px;
                height: 88dvh; max-height: 820px;
                border: 1px solid var(--border);
                border-radius: 24px; overflow: hidden;
                padding-top: 0;
            }
            .overlay { align-items: center; justify-content: center; }
            .overlay-sheet {
                width: 360px; border-radius: 20px;
                padding: 32px 28px;
                animation: fadeScale 0.2s ease;
            }
            @keyframes fadeScale {
                from { opacity:0; transform:scale(0.96); }
                to   { opacity:1; transform:scale(1); }
            }
            .sheet-handle { display: none; }

            .header { padding: 16px 20px 14px; }
            #chat {
                padding: 16px 20px 8px;
                overflow-y: auto;
            }
            #chat::-webkit-scrollbar { display: block; width: 4px; }
            #chat::-webkit-scrollbar-track { background: transparent; }
            #chat::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

            .msg-col { max-width: 72%; }
            .bubble { font-size: 14px; }
            .input-area { padding: 10px 16px 14px; }
            #send { border-radius: 12px; }
            .nick-badge:hover { border-color: rgba(200,243,90,0.5); }
        }
        @media (min-width: 1280px) {
            .app { width: 520px; }
        }
    </style>
</head>
<body>

<div class="overlay" id="overlay">
    <div class="overlay-sheet">
        <div class="sheet-handle"></div>
        <div>
            <p class="overlay-title">Setting name</p>
            <p class="overlay-sub">Write your name</p>
        </div>
        <input
            class="overlay-input" id="nickInput"
            type="text" placeholder="ex) siyun"
            maxlength="20" autocomplete="off"
            autocorrect="off" autocapitalize="none" spellcheck="false"
        />
        <p class="overlay-error" id="nickError"></p>
        <button class="overlay-btn" id="nickBtn">입장하기</button>
    </div>
</div>

<div class="app">
    <header class="header">
        <div class="header-dot"></div>
        <h1 class="header-title">Chat</h1>
        <div class="header-right">
            <span class="nick-badge" id="nickDisplay" title="tap to change name"></span>
        </div>
    </header>

    <div id="chat">
        <div class="empty-state" id="emptyState">
            <span style="font-size:22px;opacity:0.25">✦</span>
            <p>THere's no message yet</p>
            <p>Say hello first!</p>
        </div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <textarea
                id="message"
                placeholder="type your message..."
                rows="1" maxlength="500"
                autocorrect="off" autocapitalize="none" spellcheck="false"
            ></textarea>
            <button id="send" title="send">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    let myUsername    = null;
    let renderedCount = 0;

    const overlay    = document.getElementById('overlay');
    const nickInput  = document.getElementById('nickInput');
    const nickBtn    = document.getElementById('nickBtn');
    const nickError  = document.getElementById('nickError');
    const nickDisplay= document.getElementById('nickDisplay');
    const chatDiv    = document.getElementById('chat');
    const emptyState = document.getElementById('emptyState');
    const msgInput   = document.getElementById('message');
    const sendBtn    = document.getElementById('send');
    const appEl      = document.querySelector('.app');

    function adjustLayout() {
        if (!window.visualViewport) return;
        const mobile = window.innerWidth < 769;
        if (mobile) {
            appEl.style.height = window.visualViewport.height + 'px';
            appEl.style.top    = window.visualViewport.offsetTop + 'px';
        } else {
            appEl.style.height = '';
            appEl.style.top    = '';
        }
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            adjustLayout();
            requestAnimationFrame(() => { chatDiv.scrollTop = chatDiv.scrollHeight; });
        });
        window.visualViewport.addEventListener('scroll', adjustLayout);
    }

    /* ── 닉네임 설정 ── */
    async function setUsername() {
        const name = nickInput.value.trim();
        if (!name) { nickError.textContent = 'type your name'; return; }

        const res  = await fetch('/set_username', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: name })
        });
        const data = await res.json();

        if (!res.ok) { nickError.textContent = data.error || 'There is an system error'; return; }

        myUsername = data.username;
        nickDisplay.textContent = myUsername;
        overlay.classList.add('hidden');
        startPolling();
        setTimeout(() => msgInput.focus(), 150);
    }

    nickBtn.addEventListener('click', setUsername);
    nickInput.addEventListener('keydown', e => { if (e.key === 'Enter') setUsername(); });

    nickDisplay.addEventListener('click', () => {
        nickInput.value = myUsername || '';
        nickError.textContent = '';
        overlay.classList.remove('hidden');
        setTimeout(() => nickInput.focus(), 100);
    });

    function appendMessage(msg) {
        const isOwn = msg.username === myUsername;

        const wrapper = document.createElement('div');
        wrapper.className = `msg-wrapper ${isOwn ? 'outgoing' : 'incoming'}`;

        const col = document.createElement('div');
        col.className = 'msg-col';

        if (!isOwn) {
            const nick = document.createElement('span');
            nick.className = 'nick';
            nick.textContent = msg.username;
            col.appendChild(nick);
        }

        const bubble = document.createElement('div');
        bubble.className = `bubble ${isOwn ? 'out' : 'in'}`;
        bubble.textContent = msg.text;
        col.appendChild(bubble);

        const ts = document.createElement('span');
        ts.className = 'ts';
        ts.textContent = msg.timestamp;
        col.appendChild(ts);

        wrapper.appendChild(col);
        chatDiv.appendChild(wrapper);
    }

    async function fetchMessages() {
        try {
            const res  = await fetch(`/messages?after=${renderedCount}`);
            const data = await res.json();
            if (!data.messages.length) return;
            if (renderedCount === 0) emptyState.style.display = 'none';
            data.messages.forEach(appendMessage);
            renderedCount += data.messages.length;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        } catch { 

        }
    }

    function startPolling() {
        fetchMessages();
        setInterval(fetchMessages, 1500);
    }

    async function sendMessage() {
        const text = msgInput.value.trim();
        if (!text || !myUsername) return;

        const res  = await fetch('/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text })
        });
        const data = await res.json();

        if (res.ok) {
            msgInput.value = '';
            msgInput.style.height = '26px';
            if (emptyState.style.display !== 'none') emptyState.style.display = 'none';
            appendMessage(data.message);
            renderedCount += 1;
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }
    }

    sendBtn.addEventListener('click', sendMessage);

    msgInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey && window.innerWidth >= 769) {
            e.preventDefault();
            sendMessage();
        }
    });

    msgInput.addEventListener('input', () => {
        msgInput.style.height = '26px';
        msgInput.style.height = Math.min(msgInput.scrollHeight, 110) + 'px';
    });

    msgInput.addEventListener('focus', () => {
        setTimeout(() => { chatDiv.scrollTop = chatDiv.scrollHeight; }, 350);
    });
</script>
</body>
</html>
